<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Support System</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        p { font-size: 1.125rem; line-height: 1.6; color: #64748b; }
        .status {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.5rem 1rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
        }
        code {
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agentic Support AI</h1>
        <p>The system is <strong>online</strong> and ready to process customer queries using Gemini Flash.</p>
        <div class="status">● System Operational</div>
        <p style="margin-top: 2rem; font-size: 0.875rem;">
            Test the API via <code>POST /api/tickets</code>
        </p>
    </div>
</body>
</html>
