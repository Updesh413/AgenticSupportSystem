spring.application.name=agentic-support-system

# 1. Server Configuration
# Render provides the PORT variable automatically
server.port=${PORT:8080}
server.shutdown=graceful

# 2. Database Configuration
# USE PORT 6543 (Supabase Connection Pooler) for better cloud reliability
# URL Format: jdbc:postgresql://aws-0-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Hikari Connection Pool (Optimized for Render Memory)
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=200000
spring.datasource.hikari.initialization-fail-timeout=0

# 4. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Help Hibernate identify the DB even if metadata is slow
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 5. Security & AI
# Get these from Clerk and Google AI Studio
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL}
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-1.5-flash

# 6. n8n Configuration
n8n.webhook.base-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook}

# 7. High-Throughput
spring.threads.virtual.enabled=true

# 8. Logging
logging.level.org.springframework=INFO
logging.level.com.zaxxer.hikari=INFO
