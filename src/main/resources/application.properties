spring.application.name=agentic-support-system

# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful

# Database Configuration
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Robust Connection Pooling
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Auth & AI
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-flash-latest
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL}

# Logging (Helps us see EXACTLY what fails in Render)
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.zaxxer.hikari=DEBUG

# High-Throughput: Java 21 Virtual Threads
spring.threads.virtual.enabled=true

# LangChain4j Config (Google AI Gemini)
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-flash-latest

# n8n Configuration
n8n.webhook.base-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook}

# Clerk JWT Validation (OIDC)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL}
