spring.application.name=agentic-support-system

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/agentic_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# High-Throughput: Java 21 Virtual Threads
spring.threads.virtual.enabled=true

# LangChain4j Config (Google AI Gemini - Free Tier)
# Get your free key at https://aistudio.google.com/
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-flash-latest

# n8n Configuration
n8n.webhook.base-url=http://localhost:5678/webhook
